services:
  rosbag-browser:
    build:
      context: .
      target: runtime
    image: rosbag-browser
    container_name: rosbag-browser
    ports:
      - "8000:8000"
    environment:
      BAG_ROOT: /bags
      BAG_OUTPUT_ROOT: /bag-output
      DB_PATH: /data/rosbag-browser.sqlite3
      TZ: ${TZ:-Asia/Tokyo}
    volumes:
      - ${HOST_BAG_ROOT:-/share/Bags}:/bags:ro
      - ${HOST_BAG_OUTPUT_ROOT:-/share/Container/rosbag-browser}:/bag-output:rw
      - /share/Container/rosbag-browser:/data:rw
    restart: unless-stopped
